name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: preview-server/package-lock.json

      - name: Install dependencies
        working-directory: preview-server
        run: npm ci

      - name: Build NestJS app
        working-directory: preview-server
        run: npm run build

      - name: Export static site
        working-directory: preview-server
        run: npm run export

      - uses: actions/upload-pages-artifact@v3
        with:
          path: preview-server/dist-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

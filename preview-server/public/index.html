<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep</title>

  <!-- Highlight.js theme for server-rendered code blocks -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />

  <style>
    /* ── Reset & tokens ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 260px;
      --header-h: 56px;
      --reader-h: 64px;

      --bg:         #f6f8fa;
      --bg-content: #ffffff;
      --sidebar-bg: #161b22;
      --sidebar-fg: #c9d1d9;
      --sidebar-hover: #21262d;
      --sidebar-active: #1f6feb;
      --header-bg:  #0d1117;
      --header-fg:  #e6edf3;

      --accent:     #1f6feb;
      --accent-2:   #388bfd;
      --border:     #d0d7de;
      --border-dark:#30363d;

      --text:       #1f2328;
      --text-muted: #656d76;

      --reader-bg:  #0d1117;
      --reader-fg:  #e6edf3;

      --radius: 6px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      height: var(--header-h);
      background: var(--header-bg);
      color: var(--header-fg);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-dark);
      z-index: 100;
    }

    header .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    header .logo span { color: var(--accent-2); }

    header .breadcrumb {
      flex: 1;
      font-size: 13px;
      color: #8b949e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Reader toggle button in header ─────────────────────────────────── */
    #btn-toggle-reader {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius);
      border: 1px solid #30363d;
      background: transparent;
      color: var(--header-fg);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }

    #btn-toggle-reader:hover { background: #21262d; border-color: #8b949e; }
    #btn-toggle-reader.active { background: #1f6feb22; border-color: var(--accent); color: var(--accent-2); }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    aside {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-dark);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    aside::-webkit-scrollbar { width: 6px; }
    aside::-webkit-scrollbar-track { background: transparent; }
    aside::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .sidebar-search {
      padding: 12px;
      border-bottom: 1px solid var(--border-dark);
    }

    .sidebar-search input {
      width: 100%;
      background: #0d1117;
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 13px;
      color: var(--sidebar-fg);
      outline: none;
    }

    .sidebar-search input::placeholder { color: #484f58; }
    .sidebar-search input:focus { border-color: var(--accent); }

    nav { padding: 8px 0 16px; flex: 1; }

    /* Individual file link */
    .nav-file {
      display: block;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--sidebar-fg);
      text-decoration: none;
      border-radius: 0;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.1s, color 0.1s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-file:hover { background: var(--sidebar-hover); color: #fff; }

    .nav-file.active {
      background: #1f6feb22;
      color: var(--accent-2);
      font-weight: 600;
      border-left: 2px solid var(--accent);
      padding-left: 14px;
    }

    /* Top-level file (Home) */
    .nav-file.root { padding-left: 16px; font-weight: 500; }

    /* Folder section */
    .nav-folder { margin-top: 4px; }

    .nav-folder-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #484f58;
      cursor: pointer;
      user-select: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-folder-header:hover { color: #8b949e; }
    .nav-folder-header.active { color: var(--accent-2); }

    .nav-folder-header .chevron {
      transition: transform 0.2s;
      font-size: 10px;
    }

    .nav-folder-header.collapsed .chevron { transform: rotate(-90deg); }

    .nav-folder-children { overflow: hidden; }
    .nav-folder-children.collapsed { display: none; }

    .nav-folder-children .nav-file { padding-left: 28px; }
    .nav-folder-children .nav-file.active { padding-left: 26px; }

    /* ── Main content ────────────────────────────────────────────────────── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
      background: var(--bg-content);
    }

    main::-webkit-scrollbar { width: 8px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Markdown content styles ─────────────────────────────────────────── */
    #content {
      max-width: 860px;
      margin: 0 auto;
      line-height: 1.7;
    }

    #content h1 { font-size: 2em; font-weight: 700; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    #content h2 { font-size: 1.5em; font-weight: 600; margin: 28px 0 14px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    #content h3 { font-size: 1.2em; font-weight: 600; margin: 22px 0 10px; }
    #content h4, #content h5, #content h6 { font-weight: 600; margin: 18px 0 8px; }

    #content p { margin-bottom: 14px; }

    #content a { color: var(--accent); text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    #content ul, #content ol { padding-left: 24px; margin-bottom: 14px; }
    #content li { margin-bottom: 4px; }
    #content li > ul, #content li > ol { margin-top: 4px; margin-bottom: 0; }

    #content blockquote {
      border-left: 4px solid var(--border);
      padding: 8px 16px;
      color: var(--text-muted);
      margin: 14px 0;
      background: var(--bg);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    #content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    #content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 14px; }
    #content th, #content td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
    #content th { background: var(--bg); font-weight: 600; }
    #content tr:nth-child(even) { background: #f9fafb; }

    /* Inline code */
    #content code:not(pre code) {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: var(--font-mono);
      font-size: 0.875em;
      color: #c0392b;
    }

    /* Code blocks (server-side highlighted) */
    #content pre {
      border-radius: var(--radius);
      margin: 16px 0;
      overflow-x: auto;
    }

    #content pre code {
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      display: block;
      padding: 16px 20px;
    }

    /* Banner images */
    #content .md-image {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 16px 0;
    }

    /* ── Loading / empty states ───────────────────────────────────────────── */
    .state-loading, .state-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60%;
      gap: 12px;
      color: var(--text-muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Screen Reader Panel ─────────────────────────────────────────────── */
    #reader-panel {
      flex-shrink: 0;
      height: var(--reader-h);
      background: var(--reader-bg);
      border-top: 1px solid var(--border-dark);
      display: none;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    #reader-panel.visible { display: flex; }

    .reader-label {
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
    }

    .reader-progress {
      flex: 1;
      height: 4px;
      background: #21262d;
      border-radius: 2px;
      overflow: hidden;
    }

    .reader-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .reader-status {
      font-size: 12px;
      color: #8b949e;
      min-width: 60px;
      text-align: right;
    }

    /* Reader control buttons */
    .reader-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .reader-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      border: 1px solid #30363d;
      background: transparent;
      color: var(--reader-fg);
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s, border-color 0.15s;
    }

    .reader-btn:hover { background: #21262d; border-color: #8b949e; }
    .reader-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .reader-btn.active { background: #1f6feb22; border-color: var(--accent); color: var(--accent-2); }

    /* Speed selector */
    #reader-speed {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: var(--radius);
      color: var(--reader-fg);
      font-size: 12px;
      padding: 4px 6px;
      cursor: pointer;
      outline: none;
    }

    #reader-speed:focus { border-color: var(--accent); }

    /* Voice selector */
    #reader-voice {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: var(--radius);
      color: var(--reader-fg);
      font-size: 12px;
      padding: 4px 6px;
      cursor: pointer;
      outline: none;
      max-width: 160px;
    }

    /* ── Reading highlight ───────────────────────────────────────────────── */
    .reading-highlight {
      background: #fffbcc;
      border-radius: 2px;
      transition: background 0.3s;
    }

    /* ── Toast notification ──────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: #1c2128;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: var(--radius);
      padding: 8px 14px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 220px; }
      main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- ── Header ────────────────────────────────────────────────────────── -->
  <header>
    <div class="logo">📚 Interview <span>Prep</span></div>
    <div class="breadcrumb" id="breadcrumb">Home</div>
    <button id="btn-toggle-reader" title="Toggle screen reader (Alt+R)">
      <span>🔊</span> <span>Read Aloud</span>
    </button>
  </header>

  <!-- ── Body layout ───────────────────────────────────────────────────── -->
  <div class="layout">

    <!-- Sidebar -->
    <aside>
      <div class="sidebar-search">
        <input type="search" id="sidebar-search" placeholder="Filter files…" autocomplete="off" />
      </div>
      <nav id="nav-tree">
        <div class="state-loading"><div class="spinner"></div></div>
      </nav>
    </aside>

    <!-- Content -->
    <main id="main-scroll">
      <div id="content">
        <div class="state-loading">
          <div class="spinner"></div>
          <div>Loading…</div>
        </div>
      </div>
    </main>

  </div>

  <!-- ── Screen Reader Panel ────────────────────────────────────────────── -->
  <div id="reader-panel" role="region" aria-label="Screen reader controls">
    <div class="reader-label">🔊 Read Aloud</div>

    <div class="reader-progress" title="Reading progress">
      <div class="reader-progress-bar" id="reader-progress-bar"></div>
    </div>

    <div class="reader-status" id="reader-status">Ready</div>

    <div class="reader-controls">
      <!-- Play / Pause -->
      <button class="reader-btn" id="btn-play"  title="Play (Space)">▶</button>
      <button class="reader-btn" id="btn-pause" title="Pause (Space)" disabled>⏸</button>
      <!-- Stop -->
      <button class="reader-btn" id="btn-stop" title="Stop (Esc)" disabled>⏹</button>
      <!-- Skip back / forward -->
      <button class="reader-btn" id="btn-prev" title="Previous paragraph (←)">⏮</button>
      <button class="reader-btn" id="btn-next" title="Next paragraph (→)">⏭</button>
    </div>

    <!-- Speed -->
    <select id="reader-speed" title="Playback speed" aria-label="Reading speed">
      <option value="0.75">0.75×</option>
      <option value="1" selected>1×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2×</option>
    </select>

    <!-- Voice -->
    <select id="reader-voice" title="Voice" aria-label="Select voice"></select>
  </div>

  <!-- Toast -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script>
  (() => {
    'use strict';

    // ── State ──────────────────────────────────────────────────────────────
    let currentPath = null;
    let fileTree = [];

    // ── DOM refs ───────────────────────────────────────────────────────────
    const contentEl      = document.getElementById('content');
    const navTreeEl      = document.getElementById('nav-tree');
    const breadcrumbEl   = document.getElementById('breadcrumb');
    const sidebarSearch  = document.getElementById('sidebar-search');
    const readerPanel    = document.getElementById('reader-panel');
    const btnToggle      = document.getElementById('btn-toggle-reader');
    const toastEl        = document.getElementById('toast');

    // Reader controls
    const btnPlay        = document.getElementById('btn-play');
    const btnPause       = document.getElementById('btn-pause');
    const btnStop        = document.getElementById('btn-stop');
    const btnPrev        = document.getElementById('btn-prev');
    const btnNext        = document.getElementById('btn-next');
    const speedSelect    = document.getElementById('reader-speed');
    const voiceSelect    = document.getElementById('reader-voice');
    const progressBar    = document.getElementById('reader-progress-bar');
    const readerStatus   = document.getElementById('reader-status');

    // ── Toast ──────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, duration = 2500) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    // ── Route ↔ file-path conversion ──────────────────────────────────────
    //
    //  URL pathname (route)   →  API file path
    //  ──────────────────────────────────────────
    //  /  (root)              →  README.md
    //  /nodejs                →  nodejs/README.md
    //  /nodejs/1-10           →  nodejs/1-10.md
    //  /nodejs/basics         →  nodejs/basics.md
    //  /python                →  python/README.md
    //  /php                   →  php/README.md
    //
    const LANG_FOLDERS = ['nodejs', 'python', 'php'];

    function routeToFilePath(route) {
      // route is a clean pathname, e.g. "/nodejs/1-10" or "nodejs/1-10"
      const clean = route.replace(/^\//, '');
      if (!clean) return 'README.md';
      const parts = clean.split('/');
      const folder = parts[0];
      if (!LANG_FOLDERS.includes(folder)) return null;
      if (parts.length === 1) return `${folder}/README.md`;
      return `${folder}/${parts.slice(1).join('/')}.md`;
    }

    function filePathToRoute(filePath) {
      if (!filePath || filePath === 'README.md') return '/';
      if (filePath.endsWith('/README.md')) return '/' + filePath.replace('/README.md', '');
      return '/' + filePath.replace(/\.md$/, '');
    }

    // An anchor like #1-middleware-in-expressjs — not a page-level navigation
    function isSamePageAnchor(hash) {
      if (!hash) return false;
      const folder = hash.split('/')[0];
      return !LANG_FOLDERS.includes(folder);
    }

    // ── Router ─────────────────────────────────────────────────────────────
    function navigate(filePath, pushState = true) {
      if (!filePath) return;
      const route = filePathToRoute(filePath);
      if (pushState) {
        history.pushState({ filePath }, '', route);
      }
      loadContent(filePath);
    }

    window.addEventListener('popstate', (e) => {
      const filePath = e.state?.filePath ?? routeToFilePath(location.pathname);
      if (filePath) loadContent(filePath);
    });

    // Intercept same-page anchor clicks so they don't fight pushState
    document.addEventListener('click', (e) => {
      const a = e.target.closest('a[href^="#"]');
      if (!a) return;
      const hash = a.getAttribute('href').replace(/^#/, '');
      if (isSamePageAnchor(hash)) {
        // Let the browser scroll naturally; preserve the current route in history
        history.replaceState({ filePath: currentPath }, '', location.pathname + '#' + hash);
      }
    });

    // ── API calls ──────────────────────────────────────────────────────────
    async function fetchFileTree() {
      const res = await fetch('/api/files');
      if (!res.ok) throw new Error('Failed to load file tree');
      return res.json();
    }

    async function fetchRendered(mdPath) {
      const res = await fetch(`/api/render?path=${encodeURIComponent(mdPath)}`);
      if (!res.ok) throw new Error(`Failed to load: ${mdPath}`);
      return res.json();
    }

    // ── Sidebar rendering ──────────────────────────────────────────────────
    function renderTree(tree, filter = '') {
      const lc = filter.toLowerCase();
      navTreeEl.innerHTML = '';

      for (const node of tree) {
        if (node.type === 'file') {
          if (filter && !node.name.toLowerCase().includes(lc)) continue;
          navTreeEl.appendChild(makeFileLink(node, 'root'));
        } else {
          // Folder
          const matchingChildren = filter
            ? node.children.filter(c => c.name.toLowerCase().includes(lc))
            : node.children;

          if (filter && matchingChildren.length === 0) continue;

          const folderEl = document.createElement('div');
          folderEl.className = 'nav-folder';

          const header = document.createElement('button');
          header.className = 'nav-folder-header';
          header.dataset.folderPath = node.path;
          header.innerHTML = `<span class="chevron">▾</span> ${escHtml(node.name)}`;
          header.addEventListener('click', (e) => {
            // Single-click → navigate to language overview (README.md)
            navigate(`${node.path}/README.md`);
            // Always expand; collapse only on a second click when already active
            const isActive = currentPath === `${node.path}/README.md`;
            if (isActive) {
              header.classList.toggle('collapsed');
              childrenEl.classList.toggle('collapsed');
            } else {
              header.classList.remove('collapsed');
              childrenEl.classList.remove('collapsed');
            }
          });

          const childrenEl = document.createElement('div');
          childrenEl.className = 'nav-folder-children';
          if (filter) childrenEl.dataset.filterExpanded = 'true';

          for (const child of matchingChildren) {
            childrenEl.appendChild(makeFileLink(child));
          }

          folderEl.appendChild(header);
          folderEl.appendChild(childrenEl);
          navTreeEl.appendChild(folderEl);
        }
      }

      highlightActiveLink();
    }

    function makeFileLink(node, extraClass = '') {
      const btn = document.createElement('button');
      btn.className = `nav-file${extraClass ? ' ' + extraClass : ''}`;
      btn.textContent = node.name;
      btn.dataset.path = node.path;
      btn.setAttribute('title', node.path);
      btn.addEventListener('click', () => navigate(node.path));
      return btn;
    }

    function highlightActiveLink() {
      document.querySelectorAll('.nav-file').forEach(el => {
        el.classList.toggle('active', el.dataset.path === currentPath);
      });
      // Highlight folder header when its overview (README.md) is the active page
      document.querySelectorAll('.nav-folder-header').forEach(el => {
        const overviewPath = `${el.dataset.folderPath}/README.md`;
        el.classList.toggle('active', currentPath === overviewPath);
      });
    }

    // ── Content loading ────────────────────────────────────────────────────
    async function loadContent(mdPath) {
      readerStop();
      currentPath = mdPath;
      highlightActiveLink();

      // Breadcrumb from the file path, e.g. nodejs/1-10.md → "Node.js › 1–10"
      const LABELS = { nodejs: 'Node.js', python: 'Python', php: 'PHP' };
      const crumbParts = mdPath.replace(/\.md$/, '').split('/');
      if (crumbParts[crumbParts.length - 1] === 'README') crumbParts.pop();
      const crumbs = crumbParts.length === 0
        ? ['Home']
        : crumbParts.map((p, i) => (i === 0 ? (LABELS[p] ?? p) : p.replace(/-/g, '–')));
      breadcrumbEl.textContent = crumbs.join(' › ');

      // Show spinner
      contentEl.innerHTML = `<div class="state-loading"><div class="spinner"></div><div>Loading…</div></div>`;

      try {
        const { html } = await fetchRendered(mdPath);
        contentEl.innerHTML = html;

        // Wire up internal markdown links (data-md-link holds a repo-root file path)
        contentEl.querySelectorAll('[data-md-link]').forEach(a => {
          a.addEventListener('click', (e) => {
            e.preventDefault();
            navigate(a.dataset.mdLink);
          });
        });


        // Scroll to anchor or top — defer one frame so the DOM has painted
        const anchor = location.hash.replace(/^#/, '');
        requestAnimationFrame(() => {
          if (anchor && isSamePageAnchor(anchor)) {
            const target = document.getElementById(anchor);
            if (target) {
              target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
              document.getElementById('main-scroll').scrollTop = 0;
            }
          } else {
            document.getElementById('main-scroll').scrollTop = 0;
          }
        });
      } catch (err) {
        contentEl.innerHTML = `<div class="state-empty">⚠️ ${escHtml(err.message)}</div>`;
      }
    }

    // ── Search/filter ──────────────────────────────────────────────────────
    sidebarSearch.addEventListener('input', () => {
      renderTree(fileTree, sidebarSearch.value);
    });

    // ── Screen Reader ──────────────────────────────────────────────────────
    const synth = window.speechSynthesis;
    let paragraphs    = [];   // array of { text, el } for each readable chunk
    let paraIndex     = 0;    // current paragraph index
    let utterance     = null;
    let isReading     = false;
    let isPaused      = false;

    // Populate voice list
    function populateVoices() {
      const voices = synth.getVoices().filter(v => v.lang.startsWith('en'));
      voiceSelect.innerHTML = '';
      if (voices.length === 0) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'Default voice';
        voiceSelect.appendChild(opt);
        return;
      }
      voices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        if (v.default) opt.selected = true;
        voiceSelect.appendChild(opt);
      });
    }

    populateVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = populateVoices;
    }

    // Extract readable paragraphs from the content DOM
    function extractParagraphs() {
      const selectors = 'p, h1, h2, h3, h4, h5, h6, li, blockquote, td, th';
      const nodes = contentEl.querySelectorAll(selectors);
      paragraphs = [];
      nodes.forEach(el => {
        const text = el.innerText?.trim();
        if (text && text.length > 0) {
          paragraphs.push({ text, el });
        }
      });
    }

    function readerUpdateUI() {
      btnPlay.disabled  = isReading && !isPaused;
      btnPause.disabled = !isReading || isPaused;
      btnStop.disabled  = !isReading && !isPaused;
      btnPlay.classList.toggle('active', isReading && !isPaused);

      if (!isReading && !isPaused) {
        readerStatus.textContent = 'Ready';
        progressBar.style.width = '0%';
      } else if (isPaused) {
        readerStatus.textContent = 'Paused';
      } else {
        const pct = paragraphs.length > 0
          ? Math.round((paraIndex / paragraphs.length) * 100)
          : 0;
        readerStatus.textContent = `${pct}%`;
        progressBar.style.width = `${pct}%`;
      }
    }

    function readerHighlight(el) {
      // Remove previous highlight
      contentEl.querySelectorAll('.reading-highlight').forEach(n => {
        n.classList.remove('reading-highlight');
      });
      if (el) {
        el.classList.add('reading-highlight');
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function speakParagraph(index) {
      if (index >= paragraphs.length) {
        readerStop();
        showToast('Finished reading');
        return;
      }

      paraIndex = index;
      const { text, el } = paragraphs[index];
      readerHighlight(el);

      utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = parseFloat(speedSelect.value);

      // Assign selected voice
      const voices = synth.getVoices().filter(v => v.lang.startsWith('en'));
      const voiceIdx = parseInt(voiceSelect.value, 10);
      if (!isNaN(voiceIdx) && voices[voiceIdx]) {
        utterance.voice = voices[voiceIdx];
      }

      utterance.onend = () => {
        if (isReading && !isPaused) {
          speakParagraph(index + 1);
        }
      };

      utterance.onerror = (e) => {
        if (e.error !== 'interrupted') {
          showToast(`Speech error: ${e.error}`);
          readerStop();
        }
      };

      synth.speak(utterance);
      readerUpdateUI();
    }

    function readerPlay() {
      if (!synth) { showToast('Speech synthesis not supported in this browser'); return; }

      if (isPaused) {
        isPaused = false;
        isReading = true;
        synth.resume();
        readerUpdateUI();
        return;
      }

      synth.cancel();
      extractParagraphs();

      if (paragraphs.length === 0) {
        showToast('Nothing to read');
        return;
      }

      isReading = true;
      isPaused  = false;
      speakParagraph(paraIndex);
    }

    function readerPause() {
      if (!isReading) return;
      isPaused = true;
      synth.pause();
      readerUpdateUI();
    }

    function readerStop() {
      synth.cancel();
      isReading = false;
      isPaused  = false;
      paraIndex = 0;
      readerHighlight(null);
      progressBar.style.width = '0%';
      readerUpdateUI();
    }

    function readerSkip(delta) {
      const wasReading = isReading;
      synth.cancel();
      const next = Math.max(0, Math.min(paraIndex + delta, paragraphs.length - 1));
      paraIndex = next;
      if (wasReading || isPaused) {
        isPaused  = false;
        isReading = true;
        speakParagraph(next);
      }
    }

    btnPlay.addEventListener('click',  readerPlay);
    btnPause.addEventListener('click', readerPause);
    btnStop.addEventListener('click',  readerStop);
    btnPrev.addEventListener('click',  () => readerSkip(-1));
    btnNext.addEventListener('click',  () => readerSkip(+1));

    speedSelect.addEventListener('change', () => {
      if (isReading && !isPaused) {
        // Restart current paragraph at new speed
        synth.cancel();
        speakParagraph(paraIndex);
      }
    });

    // ── Reader panel toggle ────────────────────────────────────────────────
    btnToggle.addEventListener('click', () => {
      const visible = readerPanel.classList.toggle('visible');
      btnToggle.classList.toggle('active', visible);
      if (!visible) readerStop();
    });

    // ── Keyboard shortcuts ─────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      // Skip if focus is in an input
      if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;

      const alt = e.altKey;

      if (alt && e.key === 'r') { btnToggle.click(); return; }

      if (!readerPanel.classList.contains('visible')) return;

      if (e.key === ' ')          { e.preventDefault(); isReading && !isPaused ? readerPause() : readerPlay(); }
      if (e.key === 'Escape')     { readerStop(); }
      if (e.key === 'ArrowLeft')  { readerSkip(-1); }
      if (e.key === 'ArrowRight') { readerSkip(+1); }
    });

    // ── Utilities ──────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Bootstrap ──────────────────────────────────────────────────────────
    async function init() {
      try {
        fileTree = await fetchFileTree();
        renderTree(fileTree);
      } catch (err) {
        navTreeEl.innerHTML = `<div style="padding:16px;color:#f85149;font-size:13px;">Failed to load file tree</div>`;
      }

      const initialPath = routeToFilePath(location.pathname) || 'README.md';
      navigate(initialPath, false);
    }

    init();
  })();
  </script>
</body>
</html>
